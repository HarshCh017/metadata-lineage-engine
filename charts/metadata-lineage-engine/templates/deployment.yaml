apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-metadata-lineage-engine
  labels:
    app: metadata-lineage-engine
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: metadata-lineage-engine
  template:
    metadata:
      labels:
        app: metadata-lineage-engine
    spec:
      containers:
        - name: metadata-lineage-engine
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
